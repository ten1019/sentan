<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>WebAR - model-viewer</title>

  <!-- model-viewer 本体（CDNから読み込み） -->
  <script type="module"
    src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

  <style>
    :root { color-scheme: light dark; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, "Hiragino Sans", sans-serif;
      background: #101012;
      color: #eaeaea;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    header { padding: 16px 20px 8px; }
    header h1 { font-size: 17px; font-weight: 600; margin: 0 0 4px; }
    header p  { font-size: 13px; margin: 0; color: #9a9a9a; line-height: 1.6; }
    model-viewer {
      flex: 1;
      width: 100%;
      min-height: 70vh;
      background: #1a1a1d;
    }
    /* ARボタンの見た目 */
    .ar-btn {
      position: absolute;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: #2e6df6;
      color: #fff;
      border: none;
      border-radius: 999px;
      padding: 12px 22px;
      font-size: 15px;
      font-weight: 600;
      box-shadow: 0 4px 14px rgba(0,0,0,.35);
    }
    footer { padding: 10px 20px 20px; font-size: 12px; color: #6f6f6f; }
  </style>
</head>
<body>
  <header>
    <h1>WebAR デモ</h1>
    <p>「ARで見る」を押して、床が認識されたら画面をタップして3Dを設置。スマホを動かして周りを歩けます。</p>
  </header>

  <model-viewer
    src="aqua_copy.glb"
    alt="3Dモデル"
    ar
    ar-modes="webxr scene-viewer quick-look"
    ar-scale="auto"
    ar-placement="floor"
    camera-controls
    touch-action="pan-y"
    shadow-intensity="1"
    poster=""
    autoplay>
    <button slot="ar-button" class="ar-btn">ARで見る</button>
  </model-viewer>

  <footer>
    モデルを差し替えるには、上の src="..." を自分の .glb ファイルのURLに変えるだけ。
  </footer>
</body>
</html>
